seed: 42
device: auto

dataset:
  name: "ml-1m"

model:
  type: bert
  name: Bert4Rec
  params:
    hidden_size: 384
    num_layers: 2
    num_heads: 6
    hidden_dropout: 0.5
    attention_dropout: 0.3
    max_sequence_length: 25

training:
  update_steps: 40000
  warmup_ratio: 0.1
  batch_size: 256
  accumulation_steps: 1
  early_stopping_patience: 6

optimizer:
  name: AdamW
  lr: 0.0003
  weight_decay: 0.02

scheduler:
  name: linear_with_warmup

loss:
  name: CrossEntropyLoss
  params:
    ignore_index: 0

data:
  dataset: MovieLens
  model_type: bert

evaluation:
  interval: 250
  metrics:
    - hit_rate
    - ndcg

saving:
  save_best: true
  save_dir: trained_models
  filename: bert_model
  figure_dir: figures