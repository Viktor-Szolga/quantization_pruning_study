seed: 42
device: auto  # options: "auto", "cpu", "cuda"

dataset:
  name: "ml-1m"

model:
  type: bert
  name: Bert4Rec
  params:
    hidden_size: 384
    num_layers: 4
    num_heads: 8
    dropout: 0.2
    max_sequence_length: 50

training:
  update_steps: 9000
  warmup_ratio: 0.05
  batch_size: 256
  accumulation_steps: 1

optimizer:
  name: AdamW
  lr: 0.0002
  weight_decay: 0.002


scheduler:
  name: linear_with_warmup

loss:
  name: CrossEntropyLoss
  params:
    ignore_index: 0

data:
  dataset: MovieLens
  model_type: bert

evaluation:
  interval: 1000
  metrics:
    - hit_rate
    - ndcg

saving:
  save_best: true
  save_dir: trained_models
  filename: bert_model
  figure_dir: figures