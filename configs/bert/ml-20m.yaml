seed: 42
device: auto  # options: "auto", "cpu", "cuda"

dataset:
  name: "ml-20m"

model:
  type: bert
  name: Bert4Rec
  params:
    hidden_size: 256
    num_layers: 2
    num_heads: 8
    hidden_dropout: 0.2
    attention_dropout: 0.2
    max_sequence_length: 50

training:
  update_steps: 10000
  warmup_ratio: 0.1
  batch_size: 32
  accumulation_steps: 8
  early_stopping_patience: 3

optimizer:
  name: AdamW
  lr: 0.001
  weight_decay: 0.01

scheduler:
  name: linear_with_warmup

loss:
  name: CrossEntropyLoss
  params:
    ignore_index: 0

data:
  dataset: MovieLens
  model_type: bert

evaluation:
  interval: 8000
  metrics:
    - hit_rate
    - ndcg

saving:
  save_best: true
  save_dir: trained_models
  filename: bert_model
  figure_dir: figures