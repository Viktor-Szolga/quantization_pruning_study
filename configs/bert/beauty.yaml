seed: 42
device: auto

dataset:
  name: "beauty"

model:
  type: bert
  name: Bert4Rec
  params:
    hidden_size: 128
    num_layers: 1
    num_heads: 4
    hidden_dropout: 0.5
    attention_dropout: 0.2
    max_sequence_length: 25

training:
  update_steps: 20000
  warmup_ratio: 0.1
  batch_size: 64
  accumulation_steps: 2
  early_stopping_patience: 5

optimizer:
  name: AdamW
  lr: 0.0002
  weight_decay: 0.001

scheduler:
  name: linear_with_warmup

loss:
  name: CrossEntropyLoss
  params:
    ignore_index: 0

data:
  dataset: MovieLens
  model_type: bert

evaluation:
  interval: 250
  metrics:
    - hit_rate
    - ndcg

saving:
  save_best: true
  save_dir: trained_models
  filename: bert_model
  figure_dir: figures