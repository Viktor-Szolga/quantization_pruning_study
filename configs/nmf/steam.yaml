  seed: 42
  device: auto  # options: "auto", "cpu", "cuda"

  dataset:
    name: "steam"

  model:
    type: nmf
    name: NeuralMF
    params:
      latent_mf: 32
      latent_mlp: 32
      hidden_sizes: [32, 16]
      dropout_rate: 0.5

  training:
    max_steps: 25000
    num_negatives: 8
    batch_size: 128
    accumulation_steps: 1
    early_stopping_patience: 10
    max_norm: 1.0

  optimizer:
    name: AdamW
    lr: 0.005
    weight_decay: 1e-5

  scheduler:
    name: cosineAnnealing

  loss:
    name: BCELossLogits

  evaluation:
    interval: 1000
    metrics:
      - hit_rate
      - ndcg

  saving:
    save_best: true
    save_dir: trained_models
    filename: nmf_model
    figure_dir: figures