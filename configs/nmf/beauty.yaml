  seed: 42
  device: auto  # options: "auto", "cpu", "cuda"

  dataset:
    name: "beauty"

  model:
    type: nmf
    name: NeuralMF
    params:
      latent_mf: 16
      latent_mlp: 32
      hidden_sizes: [64, 16]
      dropout_rate: 0

  training:
    max_steps: 2500
    num_negatives: 50
    batch_size: 128
    accumulation_steps: 1
    early_stopping_patience: 20
    max_norm: 1.0

  optimizer:
    name: AdamW
    lr: 0.0002
    weight_decay: 0

  scheduler:
    name: cosineAnnealing

  loss:
    name: BCELossLogits

  evaluation:
    interval: 150
    metrics:
      - hit_rate
      - ndcg

  saving:
    save_best: true
    save_dir: trained_models
    filename: nmf_model
    figure_dir: figures